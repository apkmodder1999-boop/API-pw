<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW Thor - My Batches</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            border: 1px solid #334155;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .card-content {
            padding: 15px;
        }
        .title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f1f5f9;
        }
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            background-color: #10b981;
            color: white;
        }
        .status.shifted {
            background-color: #f59e0b;
        }
        .btn {
            display: block;
            text-align: center;
            background-color: #0284c7;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0369a1;
        }
    </style>
</head>
<body>

    <h1>🚀 My Batches</h1>
    <div class="grid" id="batches-grid">Loading your premium batches...</div>

    <script>
        // Automatic Data Fetcher from your proxy endpoint
        async function loadBatches() {
            try {
                // Yeh automatically aapke hi domain ke /api/batches se data uthayega
                const response = await fetch('/api/batches');
                const result = await response.json();
                
                const grid = document.getElementById('batches-grid');
                grid.innerHTML = ''; // Clear loading text

                if(result.success && result.data) {
                    result.data.forEach(batch => {
                        const isShifted = batch.status === 'BATCH_SHIFTED';
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${batch.thumbnailImageLink}" alt="${batch.itemName}">
                            <div class="card-content">
                                <div class="title">${batch.itemName}</div>
                                <span class="status ${isShifted ? 'shifted' : ''}">${batch.status}</span>
                                <a href="https://pwthor.live/study/batches/${batch.batchId}" class="btn">Open Batch</a>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<p>No data found or proxy token missing.</p>';
                }
            } catch (error) {
                document.getElementById('batches-grid').innerHTML = '<p>Error loading data. Make sure backend is active.</p>';
            }
        }

        loadBatches();
    </script>
</body>
</html>
